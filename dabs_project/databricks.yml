# This is a Databricks asset bundle definition for dabs_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dabs_project
  uuid: 69a18b1d-161e-493b-9627-ec7a0b0558cf

include:
  - permissions.yml
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-5fc57a13-8c26.cloud.databricks.com//
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-5fc57a13-8c26.cloud.databricks.com//
      # We explicitly deploy to /Workspace/Users/stuart.libby@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/project/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
